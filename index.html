<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Open Brain</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { max-width: 680px; margin: 0 auto; }

    header { margin-bottom: 32px; }
    h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: #555; margin-top: 6px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #333;
      flex-shrink: 0; transition: background 0.3s;
    }
    .dot.connected { background: #22c55e; }
    .dot.error { background: #ef4444; }

    .banner {
      background: #1a0a0a; border: 1px solid #3a1515; border-radius: 10px;
      padding: 16px 18px; margin-bottom: 24px; font-size: 0.875rem;
      color: #f87171; line-height: 1.6; display: none;
    }
    .banner code {
      background: #2a1010; padding: 1px 6px; border-radius: 4px;
      font-size: 0.8rem; font-family: monospace;
    }

    .capture {
      background: #161616; border: 1px solid #222; border-radius: 12px;
      padding: 20px; margin-bottom: 28px;
    }
    textarea {
      width: 100%; background: #0f0f0f; border: 1px solid #252525;
      border-radius: 8px; color: #e5e5e5; font-size: 0.95rem;
      padding: 12px 14px; resize: vertical; min-height: 96px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
      line-height: 1.5;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #383838; }
    .row {
      display: flex; align-items: center; gap: 12px; margin-top: 12px;
    }
    button {
      background: #6366f1; color: #fff; border: none; border-radius: 8px;
      padding: 9px 22px; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #5254cc; }
    button:disabled { background: #1e1e1e; color: #444; cursor: not-allowed; }
    .hint { font-size: 0.75rem; color: #444; }
    .save-msg { font-size: 0.8rem; min-height: 16px; }
    .save-msg.ok { color: #22c55e; }
    .save-msg.err { color: #ef4444; }

    .section-label {
      font-size: 0.7rem; font-weight: 600; color: #444;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
    }
    .thought {
      background: #161616; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 16px 18px; margin-bottom: 8px;
    }
    .thought-text { font-size: 0.9rem; color: #ccc; line-height: 1.55; white-space: pre-wrap; }
    .thought-time { font-size: 0.72rem; color: #444; margin-top: 8px; }
    .empty { color: #333; font-size: 0.875rem; text-align: center; padding: 48px 0; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>🧠 My Open Brain</h1>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="banner" id="banner"></div>

  <div class="capture">
    <textarea id="input" placeholder="Capture anything — ideas, notes, things you learned, questions, plans..." rows="4"></textarea>
    <div class="row">
      <button id="saveBtn" onclick="save()" disabled>Save to Brain</button>
      <span class="hint">or Ctrl+Enter</span>
      <span class="save-msg" id="saveMsg"></span>
    </div>
  </div>

  <div class="section-label">Recent Thoughts</div>
  <div id="list"><div class="empty">Loading...</div></div>

</div>
<script>
  let db = null

  function showBanner(html) {
    const b = document.getElementById('banner')
    b.innerHTML = html
    b.style.display = 'block'
    document.getElementById('dot').className = 'dot error'
    document.getElementById('statusText').textContent = 'Not connected'
  }

  async function init() {
    if (typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.includes('PASTE_YOUR')) {
      showBanner('Setup not complete. Open <code>config.js</code> and replace the two placeholder values with your Supabase URL and anon key.')
      document.getElementById('list').innerHTML = ''
      return
    }
    try {
      db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      const { error } = await db.from('thoughts').select('id').limit(1)
      if (error) throw error
      document.getElementById('dot').className = 'dot connected'
      document.getElementById('statusText').textContent = 'Connected to your database'
      document.getElementById('saveBtn').disabled = false
      await load()
    } catch (e) {
      showBanner('Could not connect to your database.<br><br>Error: <code>' + e.message + '</code><br><br>Check that your URL and anon key in <code>config.js</code> are correct and that you ran the migration SQL in Supabase.')
      document.getElementById('list').innerHTML = ''
    }
  }

  async function save() {
    const input = document.getElementById('input')
    const text = input.value.trim()
    if (!text) return
    const btn = document.getElementById('saveBtn')
    const msg = document.getElementById('saveMsg')
    btn.disabled = true
    btn.textContent = 'Saving...'
    msg.textContent = ''
    msg.className = 'save-msg'
    try {
      const { error } = await db.from('thoughts').insert({ content: text })
      if (error) throw error
      input.value = ''
      msg.textContent = '✓ Saved'
      msg.className = 'save-msg ok'
      await load()
    } catch (e) {
      msg.textContent = '✗ ' + e.message
      msg.className = 'save-msg err'
    } finally {
      btn.disabled = false
      btn.textContent = 'Save to Brain'
    }
  }

  async function load() {
    const list = document.getElementById('list')
    try {
      const { data, error } = await db
        .from('thoughts').select('*')
        .order('created_at', { ascending: false }).limit(20)
      if (error) throw error
      if (!data || data.length === 0) {
        list.innerHTML = '<div class="empty">No thoughts yet. Write something above.</div>'
        return
      }
      list.innerHTML = data.map(t => `
        <div class="thought">
          <div class="thought-text">${esc(t.content)}</div>
          <div class="thought-time">${fmt(t.created_at)}</div>
        </div>`).join('')
    } catch (e) {
      list.innerHTML = '<div class="empty" style="color:#ef4444">Could not load: ' + e.message + '</div>'
    }
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') save()
  })

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
  function fmt(iso) {
    return new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    })
  }

  init()
</script>
</body>
</html>
